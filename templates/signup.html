{% extends 'base.html' %}

{% block title %}Signup | Blog App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="hero-shell p-4 p-md-5">
            <h2 class="fw-bold mb-4"><i class="bi bi-person-plus me-2"></i>Create Account</h2>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label"><i class="bi bi-person me-1"></i>Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-person-plus me-1"></i>Signup</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
